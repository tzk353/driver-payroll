<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>司機薪資結算系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#111318;--paper:#f6f4ef;--s2:#edeae2;--rule:#d8d3c8;
  --red:#c0392b;--green:#1e8449;--blue:#1a5276;
  --muted:#717d7e;--light:#aab7b8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:'Noto Sans TC',sans-serif;min-height:100vh}

/* HEADER */
header{background:var(--ink);color:#fff;padding:15px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--red);position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:11px}
.logo-box{width:36px;height:36px;background:var(--red);display:grid;place-items:center;font-size:16px;clip-path:polygon(0 0,100% 0,100% 72%,72% 100%,0 100%)}
.logo h1{font-size:15px;font-weight:700}
.logo p{font-size:10px;color:#777;margin-top:1px}
.month-pick{display:flex;align-items:center;gap:7px}
.month-pick label{font-size:11px;color:#777}
.month-pick input{background:#1c1f2a;border:1px solid #333;color:#fff;font-size:12px;border-radius:4px;padding:5px 9px;outline:none;font-family:'Noto Sans TC',sans-serif}

/* LAYOUT */
.main{max-width:1120px;margin:0 auto;padding:22px 18px 80px}
.steps{display:flex;margin-bottom:22px}
.step{flex:1;padding:10px 13px;background:var(--s2);border:1px solid var(--rule);border-right:none;display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);transition:all .2s}
.step:first-child{border-radius:4px 0 0 4px}.step:last-child{border-right:1px solid var(--rule);border-radius:0 4px 4px 0}
.step.active{background:var(--ink);color:#fff;border-color:var(--ink)}.step.done{background:var(--green);color:#fff;border-color:var(--green)}
.sn{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.15);display:grid;place-items:center;font-size:10px;font-weight:700;font-family:'IBM Plex Mono',monospace;flex-shrink:0}
.step.active .sn{background:var(--red)}
.panel{display:none}.panel.active{display:block}

/* UPLOAD */
.upload-zone{border:2px dashed var(--rule);border-radius:8px;padding:50px 36px;text-align:center;cursor:pointer;background:var(--s2);transition:all .2s;position:relative}
.upload-zone:hover,.upload-zone.drag{border-color:var(--red);background:#fdf5f4}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-zone h2{font-size:16px;font-weight:700;margin:10px 0 5px}
.upload-zone p{font-size:12px;color:var(--muted)}
.ftags{display:flex;gap:5px;justify-content:center;margin-top:10px}
.ftag{background:var(--ink);color:#fff;font-size:10px;font-family:'IBM Plex Mono',monospace;padding:2px 7px;border-radius:3px}
.flist{margin-top:13px;display:flex;flex-direction:column;gap:6px}
.fitem{background:#fff;border:1px solid var(--rule);border-radius:5px;padding:9px 14px;display:flex;align-items:center;gap:9px}
.fname{font-size:12px;font-weight:600;flex:1}.fmeta{font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace}
.fdel{background:none;border:none;color:var(--light);cursor:pointer;font-size:15px}.fdel:hover{color:var(--red)}
.err-box{background:#fdf5f4;border:1px solid #f5b7b1;border-radius:5px;padding:9px 13px;font-size:12px;color:var(--red);margin-top:9px}

/* DRIVER BLOCK */
.driver-block{background:#fff;border:1px solid var(--rule);border-radius:7px;margin-bottom:14px;overflow:hidden}
.driver-hd{background:var(--ink);color:#fff;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.driver-hd-left{display:flex;align-items:center;gap:10px}
.dname-input{background:transparent;border:none;color:#fff;font-size:14px;font-weight:700;outline:none;width:110px;font-family:'Noto Sans TC',sans-serif}
.driver-hd-right{display:flex;align-items:center;gap:14px}
.rate-wrap{display:flex;align-items:center;gap:5px}
.rate-wrap span{font-size:10px;color:#aaa}
.rate-wrap input{width:52px;background:#1c1f2a;border:1px solid #444;color:#fff;border-radius:3px;padding:3px 6px;font-size:12px;outline:none;font-family:'IBM Plex Mono',monospace}
.grand-total{font-size:13px;font-family:'IBM Plex Mono',monospace;color:#f1c40f;font-weight:700}
.driver-body{padding:14px 16px}

/* FEE CHIPS */
.fee-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;align-items:center}
.fee-row-label{font-size:10px;color:var(--muted);font-weight:700;margin-right:2px}
.chip{display:flex;align-items:center;gap:4px;background:var(--s2);border:1px solid var(--rule);border-radius:16px;padding:3px 10px;cursor:pointer;font-size:11px;user-select:none;transition:all .15s}
.chip input{display:none}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.chip.on .cdot{background:#4ade80}
.cdot{width:6px;height:6px;border-radius:50%;background:var(--light);flex-shrink:0}

/* SOURCE */
.src-block{margin-bottom:10px}
.src-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.src-badge{font-size:9px;font-family:'IBM Plex Mono',monospace;padding:2px 6px;border-radius:3px;background:var(--s2);border:1px solid var(--rule);color:var(--muted)}
.src-sub{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--green);font-weight:600}
.toggle-btn{font-size:10px;color:var(--blue);background:none;border:none;cursor:pointer;padding:2px 0;display:flex;align-items:center;gap:3px;font-family:'Noto Sans TC',sans-serif;margin-bottom:5px}
.trip-wrap{display:none;overflow-x:auto;border:1px solid var(--rule);border-radius:4px;max-height:280px;overflow-y:auto}
.trip-wrap.open{display:block}
.trtable{width:100%;border-collapse:collapse;font-size:11px;min-width:720px}
.trtable th{background:#1a1d27;color:#fff;padding:6px 9px;text-align:left;font-size:9px;font-weight:600;position:sticky;top:0;z-index:2}
.trtable td{padding:5px 9px;border-bottom:1px solid #f0ede7;vertical-align:middle}
.trtable tr:hover td{background:#fafaf8}
.trtable input[type=number]{border:1px solid var(--rule);border-radius:3px;padding:3px 5px;font-size:11px;width:78px;font-family:'IBM Plex Mono',monospace;background:var(--paper);outline:none}
.trtable input:focus{border-color:var(--red)}
.fee-detail{font-size:10px;color:#888;line-height:1.6}
.fee-detail .off{color:#ccc;text-decoration:line-through}

/* ADJ */
.adj-section{margin-top:10px;padding-top:10px;border-top:1px solid var(--s2)}
.adj-label{font-size:10px;color:var(--muted);font-weight:700;margin-bottom:6px}
.adj-row{display:flex;gap:5px;align-items:center;margin-bottom:4px}
.adj-row input[type=text]{border:1px solid var(--rule);border-radius:3px;padding:4px 7px;font-size:11px;width:120px;font-family:'Noto Sans TC',sans-serif;background:var(--paper);outline:none}
.adj-row input[type=number]{border:1px solid var(--rule);border-radius:3px;padding:4px 7px;font-size:11px;width:80px;font-family:'IBM Plex Mono',monospace;background:var(--paper);outline:none}
.adj-row select{border:1px solid var(--rule);border-radius:3px;padding:4px 6px;font-size:11px;width:64px;font-family:'Noto Sans TC',sans-serif;background:var(--paper);outline:none}
.adj-row button{background:none;border:none;color:var(--light);cursor:pointer;font-size:13px}.adj-row button:hover{color:var(--red)}
.add-adj{font-size:10px;color:var(--blue);background:none;border:1px dashed var(--rule);border-radius:3px;padding:2px 8px;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.add-adj:hover{border-color:var(--blue)}

/* EXCLUDE TOGGLE */
.exclude-toggle{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
.exclude-toggle input{display:none}
.toggle-track{width:36px;height:20px;border-radius:10px;background:#333;position:relative;transition:background .2s;flex-shrink:0}
.toggle-track::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s}
.exclude-toggle input:checked+.toggle-track{background:var(--green)}
.exclude-toggle input:checked+.toggle-track::after{transform:translateX(16px)}
.driver-block.excluded .driver-hd{background:#3a3a3a}
.driver-block.excluded .driver-body{opacity:.35;pointer-events:none}
.excluded-badge{font-size:10px;color:#aaa;font-style:italic}
.driver-block.excluded .grand-total{color:#666}

/* BTNS */
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}
.btn{padding:9px 20px;border-radius:4px;border:none;font-size:12px;font-family:'Noto Sans TC',sans-serif;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#a93226}
.btn-outline{background:#fff;color:var(--ink);border:1px solid var(--rule)}.btn-outline:hover{border-color:var(--ink)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#166039}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#154360}
.btn-orange{background:#e67e22;color:#fff}.btn-orange:hover{background:#ca6f1e}
.btn-sm{padding:5px 12px;font-size:11px}

/* RESULT */
.sum-bar{background:var(--ink);color:#fff;border-radius:7px;padding:15px 22px;margin-bottom:18px;display:flex;gap:22px;align-items:center;flex-wrap:wrap}
.si{display:flex;flex-direction:column;gap:1px}
.si-label{font-size:9px;color:#777;letter-spacing:.4px}
.si-val{font-size:18px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.si-val.yl{color:#f1c40f}
.vd{width:1px;background:#2d3140;height:32px}
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}

/* RESULT CARD */
.pcard{background:#fff;border:1px solid var(--rule);border-radius:7px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.pc-hd{background:var(--ink);color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
.pc-name{font-size:16px;font-weight:700}.pc-meta{font-size:10px;color:#888;margin-top:2px}
.pc-body{padding:14px 16px}
.prow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px;border-bottom:1px solid #f5f3ee}
.prow:last-child{border-bottom:none}
.plabel{color:var(--muted)}.pval{font-family:'IBM Plex Mono',monospace;font-weight:500}
.pc-total{background:linear-gradient(135deg,#111318,#1a1d27);color:#fff;padding:16px 18px;display:flex;justify-content:space-between;align-items:center}
.pc-total-label{font-size:12px;color:#aaa}
.pc-amount{font-size:26px;font-weight:900;font-family:'IBM Plex Mono',monospace;color:#f1c40f}
.pc-actions{padding:10px 14px;border-top:1px solid var(--s2);display:flex;gap:6px;align-items:center;flex-wrap:wrap;background:#fafaf8}
.detail-wrap{display:none;margin-top:6px;overflow-x:auto;max-height:200px;overflow-y:auto;border:1px solid var(--rule);border-radius:4px}
.detail-wrap.open{display:block}
.dtt{width:100%;border-collapse:collapse;font-size:10px;min-width:480px}
.dtt th{background:var(--s2);padding:5px 7px;text-align:left;color:var(--muted);font-weight:700;position:sticky;top:0}
.dtt td{padding:5px 7px;border-bottom:1px solid #f0ede7}
.dtt .sh td{background:#e8e4da;font-size:9px;font-weight:700;color:#777;letter-spacing:.4px}
.mono{font-family:'IBM Plex Mono',monospace}
.green{color:var(--green)}.red{color:var(--red)}.blue{color:var(--blue)}

/* PDF TEMPLATE */
#pdfTpl{position:fixed;left:-9999px;top:0;width:794px;background:#fff;font-family:'Noto Sans TC',sans-serif;color:#111;padding:0}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-box">🚛</div>
    <div><h1>司機薪資結算系統</h1><p>Driver Payroll</p></div>
  </div>
  <div class="month-pick"><label>結算月份</label><input type="month" id="payMonth"></div>
</header>

<div class="main">
  <div class="steps">
    <div class="step active" id="step1"><div class="sn">1</div>上傳 Excel</div>
    <div class="step" id="step2"><div class="sn">2</div>設定費用與金額</div>
    <div class="step" id="step3"><div class="sn">3</div>下載薪資單</div>
  </div>

  <!-- P1 -->
  <div class="panel active" id="panel1">
    <div class="upload-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".xlsx,.xls" multiple>
      <div style="font-size:40px">📂</div>
      <h2>拖曳或點擊上傳對帳 Excel</h2>
      <p>支援一次多份，每位司機一份或多人同份皆可</p>
      <div class="ftags"><span class="ftag">.xlsx</span><span class="ftag">.xls</span></div>
    </div>
    <div class="flist" id="flist"></div>
    <div id="uerr"></div>
    <div class="btn-row"><button class="btn btn-red" id="nextBtn1" style="display:none" onclick="processFiles()">解析資料 →</button></div>
  </div>

  <!-- P2 -->
  <div class="panel" id="panel2">
    <div id="driverArea"></div>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="goStep(1)">← 重新上傳</button>
      <button class="btn btn-red" onclick="calcAndRender()">計算薪資 →</button>
    </div>
  </div>

  <!-- P3 -->
  <div class="panel" id="panel3">
    <div class="sum-bar" id="sumBar"></div>

    <!-- Step A: 下載 Excel 給老闆確認 -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-hd">① 下載 Excel，給老闆確認 / 修改 <small>老闆可在「薪資計算」工作表直接修改金額</small></div>
      <div style="padding:14px 18px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <button class="btn btn-orange" onclick="dlAllExcel()">📊 全部下載 Excel</button>
        <span style="font-size:11px;color:var(--muted)">或在下方結果卡片個別下載</span>
      </div>
    </div>

    <!-- Step B: 上傳修改後的 Excel → 產生 PDF -->
    <div class="card" style="margin-bottom:20px">
      <div class="card-hd">② 上傳確認後的 Excel，產生最終 PDF <small>系統會讀取老闆修改過的金額來產生薪資單</small></div>
      <div style="padding:14px 18px">
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;background:var(--s2);border:1px solid var(--rule);border-radius:5px;padding:9px 16px;font-size:12px;font-weight:600;transition:all .2s" onmouseover="this.style.borderColor='var(--blue)'" onmouseout="this.style.borderColor='var(--rule)'">
            📂 選擇已修改的 Excel
            <input type="file" accept=".xlsx" multiple style="display:none" onchange="handleExcelImport(this.files)">
          </label>
          <span style="font-size:11px;color:var(--muted)">可一次選多個司機的 Excel</span>
        </div>
        <div id="importStatus" style="margin-top:10px;font-size:12px;color:var(--muted);min-height:18px"></div>
      </div>
    </div>

    <!-- 結果卡片 -->
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
      <span>系統計算結果（尚未經老闆確認）</span>
      <button class="btn btn-green btn-sm" onclick="dlAllPDF()">⬇ 全部下載 PDF（系統版）</button>
    </div>
    <div class="rgrid" id="rgrid"></div>
  </div>
</div>

<div id="pdfTpl"></div>

<script>
const {jsPDF}=window.jspdf;
let files=[],driverData={},payrollResult=[];
const ALL_FEES=['基本費','夜間費','假日費','舉牌費','加點費','空趟費','待時費','偏遠費','座椅費','跨區費','車型費'];

const now=new Date();
document.getElementById('payMonth').value=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

// NAV
function goStep(n){
  [1,2,3].forEach(i=>{
    document.getElementById(`step${i}`).className='step'+(i<n?' done':i===n?' active':'');
    document.getElementById(`panel${i}`).className='panel'+(i===n?' active':'');
  });
  window.scrollTo({top:0,behavior:'smooth'});
}

// UPLOAD
const dz=document.getElementById('dropZone'),fi=document.getElementById('fileInput');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');addFiles([...e.dataTransfer.files])});
fi.addEventListener('change',()=>{addFiles([...fi.files]);fi.value=''});
function addFiles(fs){fs.forEach(f=>{if(!files.find(u=>u.name===f.name))files.push(f)});renderFlist()}
function removeFile(name){files=files.filter(f=>f.name!==name);renderFlist()}
function renderFlist(){
  document.getElementById('flist').innerHTML=files.map(f=>`
    <div class="fitem"><span style="font-size:16px">📊</span>
    <span class="fname">${f.name}</span><span class="fmeta">${(f.size/1024).toFixed(1)} KB</span>
    <button class="fdel" onclick="removeFile('${f.name}')">✕</button></div>`).join('');
  document.getElementById('nextBtn1').style.display=files.length?'flex':'none';
}

// PARSE
async function processFiles(){
  document.getElementById('uerr').innerHTML='';driverData={};
  for(const f of files){try{await parseFile(f)}catch(e){document.getElementById('uerr').innerHTML+=`<div class="err-box">⚠️ ${f.name}：${e.message}</div>`;}}
  if(!Object.keys(driverData).length){document.getElementById('uerr').innerHTML='<div class="err-box">⚠️ 找不到有效資料。</div>';return;}
  renderDriverArea();goStep(2);
}
function parseFile(f){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:false});
        const src=detectSrc(f.name),nff=extractName(f.name);
        let hRow=-1;
        for(let i=0;i<Math.min(6,rows.length);i++){if(rows[i]&&rows[i].some(c=>c&&String(c).includes('司機姓名'))){hRow=i;break}}
        if(hRow>=0)parseStructured(rows,hRow,src,nff);else parseSimple(rows,src,nff);
        res();
      }catch(err){rej(err)}
    };
    reader.onerror=()=>rej(new Error('讀取失敗'));
    reader.readAsArrayBuffer(f);
  });
}
function detectSrc(fn){if(/百世/i.test(fn))return'百世';if(/格上/i.test(fn))return'格上';if(/全球通/i.test(fn))return'全球通';if(/台灣大/i.test(fn))return'台灣大車隊';return fn.replace(/\.[^.]+$/,'').slice(0,8)}
function extractName(fn){const m=fn.match(/[_\-－]([^\s_\-－\.]{2,4})(?:\.|$)/);if(m)return m[1];const m2=fn.match(/[\u4e00-\u9fff]{2,4}/g);return m2?m2[m2.length-1]:null}
function ensureDriver(n){if(!driverData[n])driverData[n]={rate:90,sources:[],adjs:[],fe:{},excluded:false};ALL_FEES.forEach(k=>{if(driverData[n].fe[k]===undefined)driverData[n].fe[k]=true})}
function ensureSrc(n,l){if(!driverData[n].sources.find(s=>s.label===l))driverData[n].sources.push({label:l,trips:[]})}

function parseStructured(rows,hRow,srcLabel,nff){
  const headers=rows[hRow].map(c=>c?String(c).trim():'');
  const ci=name=>headers.findIndex(h=>h===name||h.includes(name));
  const cols={driver:ci('司機姓名'),order:ci('預約單號'),type:ci('服務類型'),time:ci('預約時間'),member:ci('會員姓名'),car:ci('車型'),airport:ci('機場'),city:ci('縣市'),dist:ci('鄉鎮市區'),plate:ci('接送車號'),total:ci('合計')};
  const feeCols={};ALL_FEES.forEach(k=>{const c=ci(k);if(c>=0)feeCols[k]=c});
  for(let i=hRow+1;i<rows.length;i++){
    const r=rows[i];if(!r)continue;
    let dn=(cols.driver>=0&&r[cols.driver])?String(r[cols.driver]).trim():nff;
    if(!dn?.trim())continue;
    const rawTotal=parseFloat(r[cols.total]);if(isNaN(rawTotal)||rawTotal===0)continue;
    const fees={};Object.entries(feeCols).forEach(([k,c])=>{const v=parseFloat(r[c])||0;if(v!==0)fees[k]=v});
    ensureDriver(dn);ensureSrc(dn,srcLabel);
    driverData[dn].sources.find(s=>s.label===srcLabel).trips.push({
      orderId:cols.order>=0&&r[cols.order]?String(r[cols.order]).trim():'',
      time:cols.time>=0&&r[cols.time]?fmtDT(r[cols.time]):'',
      member:cols.member>=0&&r[cols.member]?String(r[cols.member]).trim():'',
      type:cols.type>=0&&r[cols.type]?String(r[cols.type]).trim():'',
      car:cols.car>=0&&r[cols.car]?String(r[cols.car]).trim():'',
      airport:cols.airport>=0&&r[cols.airport]?String(r[cols.airport]).trim():'',
      city:(cols.city>=0&&r[cols.city]?String(r[cols.city]).trim():'')+(cols.dist>=0&&r[cols.dist]?' '+String(r[cols.dist]).trim():''),
      plate:cols.plate>=0&&r[cols.plate]?String(r[cols.plate]).trim():'',
      fees,rawTotal,ov:null
    });
  }
}
function parseSimple(rows,srcLabel,nff){
  if(!nff)return;ensureDriver(nff);ensureSrc(nff,srcLabel);
  const src=driverData[nff].sources.find(s=>s.label===srcLabel);
  for(const r of rows){if(!r)continue;const dv=flexDate(r[0]);const amt=parseFloat(r[2])||parseFloat(r[1]);if(dv&&!isNaN(amt)&&amt>0)src.trips.push({orderId:'',time:dv,member:'',type:'',car:'',airport:'',city:'',plate:'',fees:{'金額':amt},rawTotal:amt,ov:null});}
  if(!src.trips.length){driverData[nff].sources=driverData[nff].sources.filter(s=>s.label!==srcLabel);if(!driverData[nff].sources.length)delete driverData[nff];}
}
function fmtDT(v){if(!v)return'';const s=String(v);const m=s.match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})\s*(\d{2}:\d{2})?/);return m?`${m[2]}/${m[3]}${m[4]?' '+m[4]:''}`:s.slice(0,16)}
function flexDate(v){if(!v)return null;if(v instanceof Date)return`${v.getMonth()+1}/${v.getDate()}`;return fmtDT(String(v))||null}
function tt(t,fe){if(t.ov!==null)return t.ov;if(!Object.keys(t.fees).length)return t.rawTotal;let s=0;Object.entries(t.fees).forEach(([k,v])=>{if(fe[k]!==false)s+=v});return s||t.rawTotal}
function dgt(d){return d.sources.reduce((s,src)=>s+src.trips.reduce((ss,t)=>ss+tt(t,d.fe),0),0)}
function srcSub(src,fe){return src.trips.reduce((s,t)=>s+tt(t,fe),0)}
function sid(n){return n.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g,'_')}

function toggleFee(name,k,val){
  const d=driverData[name];if(!d)return;d.fe[k]=val;
  const chip=document.getElementById(`chip_${sid(name)}_${sid(k)}`);if(chip)chip.className='chip'+(val?' on':'');
  d.sources.forEach(src=>src.trips.forEach((t,ti)=>{if(t.ov===null){const el=document.getElementById(`ta_${sid(name)}_${sid(src.label)}_${ti}`);if(el)el.value=tt(t,d.fe);}}));
  refreshTotals(name);
  const feeKeys=[...new Set(d.sources.flatMap(s=>s.trips.flatMap(t=>Object.keys(t.fees))))].filter(fk=>ALL_FEES.includes(fk));
  document.getElementById(`srcs_${sid(name)}`).innerHTML=renderSrcTables(name,d);
  refreshTotals(name);
}
function overrideTrip(name,srcLabel,ti,val){
  const d=driverData[name];if(!d)return;
  const src=d.sources.find(s=>s.label===srcLabel);if(!src)return;
  const v=parseFloat(val);src.trips[ti].ov=isNaN(v)?null:v;refreshTotals(name);
}
function refreshTotals(name){
  const d=driverData[name];if(!d)return;
  d.sources.forEach(src=>{const el=document.getElementById(`sub_${sid(name)}_${sid(src.label)}`);if(el)el.textContent='$'+srcSub(src,d.fe).toLocaleString();});

function renameDriver(old,nw){if(old===nw||!nw.trim())return;driverData[nw.trim()]=driverData[old];delete driverData[old]}

// CALC
function calcAndRender(){
  payrollResult=Object.entries(driverData)
    .filter(([,d])=>!d.excluded)
    .map(([name,d])=>{
    const sources=d.sources.map(src=>({label:src.label,count:src.trips.length,subtotal:srcSub(src,d.fe),trips:src.trips.map(t=>({...t,finalTotal:tt(t,d.fe)}))}));
    const tripsTotal=sources.reduce((s,src)=>s+src.subtotal,0);
    const rate=(parseFloat(d.rate)||90)/100;
    const baseNet=Math.round(tripsTotal*rate);
    const plusAdj=d.adjs.filter(a=>a.type==='plus').reduce((s,a)=>s+(a.amount||0),0);
    const minusAdj=d.adjs.filter(a=>a.type==='minus').reduce((s,a)=>s+(a.amount||0),0);
    return{name,rate:d.rate,tripsTotal,baseNet,plusAdj,minusAdj,netTotal:baseNet+plusAdj-minusAdj,sources,adjs:d.adjs,fe:d.fe};
  });
  renderResults();goStep(3);
}

      <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0ede8;font-size:12px;color:#555"><span>× 抽成比例（${r.rate}%）</span><span style="font-family:'IBM Plex Mono',monospace;color:#1a5276">$${r.baseNet.toLocaleString()}</span></div>
      ${adjRows}
    </div>
    <div style="background:linear-gradient(135deg,#111318,#1a1d27);color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:13px;font-weight:700">本月應領薪資</span>
      <span style="font-size:22px;font-weight:900;font-family:'IBM Plex Mono',monospace;color:#f1c40f">$${r.netTotal.toLocaleString()}</span>
    </div>
  </div>

  <!-- TRIP DETAIL -->
  <div style="margin:24px 48px 0">
    <div style="font-size:11px;font-weight:700;color:#888;letter-spacing:.8px;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid #111">趟次明細</div>
    ${tripSections}
  </div>

  ${r.adjs.some(a=>a.ov!==null)?`<div style="margin:0 48px;padding:8px 12px;background:#fef9e7;border:1px solid #f9e79f;border-radius:4px;font-size:10px;color:#b7950b">* 標示金額為手動調整值</div>`:''}

  <div style="margin:20px 48px 36px;padding-top:12px;border-top:1px solid #e0ddd6;font-size:10px;color:#bbb;text-align:center">
    此薪資單由系統自動產生　｜　如有疑問請聯繫公司管理人員　｜　列印日期：${new Date().toLocaleDateString('zh-TW')}
  </div>
</div>`;
}

async function dlPDF(idx){
  const r=payrollResult[idx];
  const tpl=document.getElementById('pdfTpl');
  tpl.innerHTML=buildPDFHTML(r);
  await document.fonts.ready;
  await new Promise(r=>setTimeout(r,400));
  const canvas=await html2canvas(tpl,{scale:2,useCORS:true,backgroundColor:'#ffffff',width:794});
  const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const pw=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight();
  const pageH=ph/pw*canvas.width;
  let y=0;
  while(y<canvas.height){
    const sliceH=Math.min(pageH,canvas.height-y);
    const sc=document.createElement('canvas');sc.width=canvas.width;sc.height=sliceH;
    sc.getContext('2d').drawImage(canvas,0,-y);
    if(y>0)pdf.addPage();
    pdf.addImage(sc.toDataURL('image/png'),'PNG',0,0,pw,sliceH*(pw/canvas.width));
    y+=sliceH;
  }
  const mo=document.getElementById('payMonth').value||'本月';
  pdf.save(`薪資單_${r.name}_${mo}.pdf`);
  tpl.innerHTML='';
}
async function dlAllPDF(){
  for(let i=0;i<payrollResult.length;i++){await dlPDF(i);await new Promise(r=>setTimeout(r,400));}
}

// EXCEL
function dlExcel(idx){
  const r=payrollResult[idx];
  buildAndSaveExcel(r);
}
function dlAllExcel(){payrollResult.forEach((_,i)=>dlExcel(i));}

function buildAndSaveExcel(r){
  const ml=getML();
  const mo=document.getElementById('payMonth').value||'本月';
  const wb=buildExcelWb(r,ml);
  XLSX.writeFile(wb,`薪資單_${r.name}_${mo}.xlsx`);
}

function buildExcelWb(r,ml){
  const wb=XLSX.utils.book_new();
  const disabledFees=Object.entries(r.fe||{}).filter(([,v])=>!v).map(([k])=>k);

  // Sheet 1: 趟次明細
  const header=['#','訂單編號','預約時間','乘客姓名','服務類型','路線','車型','基本費','夜間費','假日費','舉牌費','加點費','空趟費','待時費','偏遠費','座椅費','跨區費','車型費','計入金額','備註'];
  const tripRows=[];
  r.sources.forEach(src=>{
    tripRows.push([src.label]);
    src.trips.forEach((t,i)=>{
      const fv={};Object.entries(t.fees||{}).forEach(([k,v])=>fv[k]=v);
      const note=t.ov!==null?'*手動調整':(disabledFees.length?'未計：'+Object.keys(t.fees||{}).filter(k=>!r.fe[k]).join('/'):'');
      tripRows.push([i+1,t.orderId||'',t.time||'',t.member||'',t.type||'',(t.city?t.city+'→':'')+' '+(t.airport||''),t.car||'',
        fv['基本費']||0,fv['夜間費']||0,fv['假日費']||0,fv['舉牌費']||0,fv['加點費']||0,
        fv['空趟費']||0,fv['待時費']||0,fv['偏遠費']||0,fv['座椅費']||0,fv['跨區費']||0,fv['車型費']||0,
        t.finalTotal,note]);
    });
  });
  const ws1=XLSX.utils.aoa_to_sheet([header,...tripRows]);
  ws1['!cols']=[{wch:4},{wch:16},{wch:16},{wch:10},{wch:12},{wch:22},{wch:10},{wch:7},{wch:7},{wch:7},{wch:7},{wch:7},{wch:7},{wch:7},{wch:7},{wch:7},{wch:7},{wch:7},{wch:10},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws1,'趟次明細');

  // Sheet 2: 薪資計算（老闆可在此修改）
  const calcRows=[
    ['司機姓名',r.name],['結算月份',ml],[''],
    ['項目','金額','說明'],
  ];
  r.sources.forEach(src=>calcRows.push([src.label+'趟次合計',src.subtotal,src.count+'趟']));
  calcRows.push(['趟次總額',r.tripsTotal,'']);
  calcRows.push(['抽成比例',r.rate+'%','']);
  calcRows.push(['稅前薪資',r.baseNet,'趟次總額×抽成']);
  if(r.adjs.length){calcRows.push(['']);r.adjs.forEach(a=>calcRows.push([a.desc||'調整項',a.type==='plus'?a.amount:-a.amount,a.type==='plus'?'加項':'減項']));}
  calcRows.push(['']);
  calcRows.push(['本月應領薪資',r.netTotal,'← 老闆可直接修改此數字']);
  if(disabledFees.length)calcRows.push(['','','⚠️ 未計入：'+disabledFees.join('、')]);
  const ws2=XLSX.utils.aoa_to_sheet(calcRows);
  ws2['!cols']=[{wch:18},{wch:14},{wch:28}];
  XLSX.utils.book_append_sheet(wb,ws2,'薪資計算');
  return wb;
}

// ── 從 Excel 讀取修改後資料並產生 PDF ──
function readExcelForPDF(file){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'array'});
        // 讀「趟次明細」sheet
        const ws1=wb.Sheets['趟次明細'];
        // 讀「薪資計算」sheet
        const ws2=wb.Sheets['薪資計算'];
        if(!ws1||!ws2){rej(new Error('找不到「趟次明細」或「薪資計算」工作表'));return;}

        const rows1=XLSX.utils.sheet_to_json(ws1,{header:1,defval:''});
        const rows2=XLSX.utils.sheet_to_json(ws2,{header:1,defval:''});

        // 從薪資計算抓基本資訊
        const name=String(rows2[0]?.[1]||'').trim();
        const ml=String(rows2[1]?.[1]||'').trim();

        // 找「本月應領薪資」那行
        let netTotal=0,tripsTotal=0,baseNet=0,rate=90;
        const adjs=[];
        let inAdj=false;
        rows2.forEach(r=>{
          const label=String(r[0]||'').trim();
          const val=parseFloat(r[1]);
          if(label==='趟次總額'&&!isNaN(val))tripsTotal=val;
          if(label==='稅前薪資'&&!isNaN(val))baseNet=val;
          if(label==='本月應領薪資'&&!isNaN(val))netTotal=val;
          if(label==='抽成比例')rate=parseFloat(String(r[1]).replace('%',''))||90;
          if(label&&label!=='項目'&&label!=='趟次總額'&&label!=='稅前薪資'&&label!=='本月應領薪資'&&label!=='抽成比例'&&label!=='司機姓名'&&label!=='結算月份'&&!isNaN(val)&&val!==0&&label.match(/^[^a-zA-Z]/)){
            // 可能是加減項
            if(!label.includes('趟次合計'))adjs.push({desc:label,amount:Math.abs(val),type:val>=0?'plus':'minus'});
          }
        });

        // 從趟次明細重建 sources
        const sourcesMap={};
        let curSrc='';
        let tripIdx=0;
        rows1.slice(1).forEach(r=>{
          const col0=String(r[0]||'').trim();
          const col18=parseFloat(r[18]);// 計入金額欄
          // 如果第一欄不是數字且其他欄空 → 來源標題行
          if(col0&&isNaN(parseInt(col0))&&!r[1]&&!r[2]){
            curSrc=col0;tripIdx=0;
            if(!sourcesMap[curSrc])sourcesMap[curSrc]={label:curSrc,count:0,subtotal:0,trips:[]};
          } else if(curSrc&&!isNaN(col18)&&col18>0){
            sourcesMap[curSrc].trips.push({
              orderId:String(r[1]||''),time:String(r[2]||''),member:String(r[3]||''),
              type:String(r[4]||''),city:String(r[5]||''),car:String(r[6]||''),
              fees:{},finalTotal:col18,ov:null
            });
            sourcesMap[curSrc].subtotal+=col18;
            sourcesMap[curSrc].count++;
            tripIdx++;
          }
        });
        const sources=Object.values(sourcesMap);

        res({name,ml,rate,tripsTotal,baseNet,netTotal,plusAdj:0,minusAdj:0,sources,adjs,fe:{}});
      }catch(err){rej(err)}
    };
    reader.onerror=()=>rej(new Error('讀取失敗'));
    reader.readAsArrayBuffer(file);
  });
}

async function handleExcelImport(fileList){
  const statusEl=document.getElementById('importStatus');
  const files=[...fileList];
  if(!files.length)return;
  statusEl.innerHTML='';
  for(const f of files){
    statusEl.innerHTML+=`<div id="imp_${f.name}">⏳ 讀取 ${f.name}…</div>`;
  }
  for(const f of files){
    const el=document.getElementById(`imp_${f.name}`);
    try{
      const r=await readExcelForPDF(f);
      const mo=document.getElementById('payMonth').value||'本月';
      if(el)el.textContent=`⏳ ${r.name}：產生 PDF 中…`;
      await dlPDFFromData(r,mo);
      if(el)el.textContent=`✅ ${r.name} 的 PDF 已下載`;
    }catch(e){
      if(el)el.textContent=`⚠️ ${f.name} 失敗：${e.message}`;
    }
    await new Promise(x=>setTimeout(x,300));
  }
}

  const canvas=await html2canvas(tpl,{scale:2,useCORS:true,backgroundColor:'#ffffff',width:794});
  const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const pw=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight();
  const pageH=ph/pw*canvas.width;let y=0;
  while(y<canvas.height){
    const sliceH=Math.min(pageH,canvas.height-y);
    const sc=document.createElement('canvas');sc.width=canvas.width;sc.height=sliceH;
    sc.getContext('2d').drawImage(canvas,0,-y);
    if(y>0)pdf.addPage();
    pdf.addImage(sc.toDataURL('image/png'),'PNG',0,0,pw,sliceH*(pw/canvas.width));
    y+=sliceH;
  }
  pdf.save(`薪資單_${r.name}_${mo}.pdf`);
  tpl.innerHTML='';
}
